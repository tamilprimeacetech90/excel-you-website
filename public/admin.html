<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>EXCEL YOU Admin</title>

    <!-- MAIN CSS -->
    <link
        rel="stylesheet"
        href="/admin.css?v=3"
    >

    <!-- QUILL CSS -->
    <link
        href="https://cdn.quilljs.com/1.3.6/quill.snow.css"
        rel="stylesheet"
    >

    <!-- QUILL IMAGE UPLOADER -->
    <link
        rel="stylesheet"
        href="https://unpkg.com/quill-image-uploader@1.2.3/dist/quill.imageUploader.min.css"
    >

    <!-- CHART JS -->
    <script
        src="https://cdn.jsdelivr.net/npm/chart.js"
    ></script>

</head>

<body>

<div class="container">

    <!-- ================= SIDEBAR ================= -->
    <aside
        class="sidebar"
        id="sidebar"
    >

        <div class="sidebar-top">

            <h2>📊 EXCEL YOU</h2>

        </div>

        <nav class="sidebar-menu">

            <button onclick="showSection('dashboard')">
                🏠 Dashboard
            </button>

            <button onclick="showSection('subject')">
                📘 Subjects
            </button>

            <button onclick="showSection('topic')">
                📖 Topics
            </button>

            <button onclick="showSection('posts')">
                📝 Posts
            </button>

            <button onclick="showSection('block')">
                🧱 Content
            </button>

        </nav>

        <div class="sidebar-bottom">

            <button
                class="logout-btn"
                onclick="logout()"
            >
                🚪 Logout
            </button>

        </div>

    </aside>


    <!-- ================= MOBILE OVERLAY ================= -->
    <div
        id="overlay"
        class="overlay"
        onclick="closeSidebar()"
    ></div>


    <!-- ================= MAIN ================= -->
    <main class="main">

        <!-- ================= TOPBAR ================= -->
        <header class="topbar">

            <button
                class="menu-btn"
                onclick="toggleSidebar()"
            >
                ☰
            </button>

            <h3>Admin Dashboard</h3>

            <button
                class="top-logout"
                onclick="logout()"
            >
                Logout
            </button>

        </header>


        <!-- ================= CONTENT ================= -->
        <div class="content">

            <!-- ================= STATS ================= -->
            <section
                id="statsBox"
                class="section"
            ></section>


            <!-- ================= DASHBOARD ================= -->
            <section
                id="dashboardSection"
                class="section"
            >

                <h1>👋 Welcome Admin</h1>

                <p>
                    Manage subjects, topics, and LMS content.
                </p>

                <canvas
                    id="mainChart"
                    height="100"
                ></canvas>

            </section>


            <!-- ================= SUBJECT SECTION ================= -->
            <section
                id="subjectSection"
                class="section hidden"
            >

                <h2>📘 Create Subject</h2>

                <input
                    id="subjectName"
                    type="text"
                    placeholder="Subject Name"
                >

                <input
                    id="subjectDesc"
                    type="text"
                    placeholder="Description"
                >

                <select id="subjectLang">

                    <option value="en">
                        English
                    </option>

                    <option value="ta">
                        Tamil
                    </option>

                </select>

                <button onclick="addSubject()">
                    + Create Subject
                </button>

                <hr>

                <h3>📚 LMS Subjects</h3>

                <div id="subjectList"></div>

            </section>


            <!-- ================= TOPIC SECTION ================= -->
            <section
                id="topicSection"
                class="section hidden"
            >

                <h2>📖 Create Topic</h2>

                <input
                    id="topicTitle"
                    type="text"
                    placeholder="Topic Title"
                >

                <input
                    id="subjectId"
                    type="text"
                    placeholder="Subject ID"
                >

                <select id="topicLang">

                    <option value="en">
                        English
                    </option>

                    <option value="ta">
                        Tamil
                    </option>

                </select>

                <button onclick="addTopic()">
                    + Create Topic
                </button>

            </section>


            <!-- ================= POSTS SECTION ================= -->
            <section
                id="postsSection"
                class="section hidden"
            >

                <div class="posts-header">

                    <h2>📝 Manage Posts</h2>

                    <div class="filters">

                        <select
                            id="filterSubject"
                            onchange="loadPosts()"
                        >

                            <option value="">
                                All Subjects
                            </option>

                        </select>

                        <select
                            id="filterVisibility"
                            onchange="loadPosts()"
                        >

                            <option value="">
                                All Status
                            </option>

                            <option value="public">
                                Published
                            </option>

                            <option value="private">
                                Draft
                            </option>

                        </select>

                    </div>

                </div>

                <div id="postsList"></div>

            </section>


            <!-- ================= CONTENT EDITOR ================= -->
            <section
                id="blockSection"
                class="section hidden"
            >

                <div class="editor-header">

                    <h2>🧱 Content Editor</h2>

                    <div class="publish-box">

                        <span
                            id="statusBadge"
                            class="badge draft"
                        >
                            Draft
                        </span>

                        <button
                            id="publishBtn"
                            onclick="togglePublish()"
                        >
                            🚀 Publish
                        </button>

                    </div>

                </div>


                <!-- TOPIC ID -->
                <input
                    id="topicId"
                    type="text"
                    placeholder="Topic ID"
                >


                <!-- IMAGE -->
                <input
                    type="file"
                    id="imageUpload"
                    accept="image/*"
                >


                <!-- QUILL -->
                <div id="editor"></div>


                <!-- SAVE STATUS -->
                <p id="saveStatus">
                    Ready
                </p>


                <!-- PREVIEW -->
                <div id="previewBox"></div>

            </section>

        </div>

    </main>

</div>


<!-- ================= QUILL ================= -->
<script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>

<!-- ================= IMAGE UPLOADER ================= -->
<script src="https://unpkg.com/quill-image-uploader@1.2.3/dist/quill.imageUploader.min.js"></script>

<!-- ================= ADMIN JS ================= -->
<script src="/admin.js?v=3"></script>

</body>
</html>
