<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EXCEL YOU Admin</title>
    
    <!-- MAIN CSS -->
    <link rel="stylesheet" href="/admin.css?v=5">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    
    <!-- DOMPurify (for preview safety) -->
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.8/dist/purify.min.js"></script>
</head>
<body>
<div class="container">
    <!-- ================= SIDEBAR ================= -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-top">
            <div class="logo-box">
                <img src="/assets/logo/full-logo.png" alt="EXCEL YOU" class="logo light-logo">
                <img src="/assets/logo/full-logo-white.png" alt="EXCEL YOU" class="logo dark-logo">
            </div>
            <p class="sidebar-subtitle">Admin Panel</p>
        </div>
        <nav class="sidebar-menu">
            <button type="button" onclick="showSection('dashboard')">🏠 Dashboard</button>
            <button type="button" onclick="showSection('subject')">📘 Subjects</button>
            <button type="button" onclick="showSection('topic')">📖 Topics</button>
            <button type="button" onclick="showSection('posts')">📝 Articles</button>
            <button type="button" onclick="showSection('block')">✍️ Editor</button>
        </nav>
        <div class="sidebar-bottom">
            <button type="button" class="logout-btn" onclick="logout()">🚪 Logout</button>
        </div>
    </aside>

    <!-- ================= MOBILE OVERLAY ================= -->
    <div id="overlay" class="overlay" onclick="closeSidebar()"></div>

    <!-- ================= MAIN ================= -->
    <main class="main">
        <!-- ================= TOPBAR ================= -->
        <header class="topbar">
            <button class="menu-btn" type="button" onclick="toggleSidebar()">☰</button>
            <div class="topbar-left">
                <h3>EXCEL YOU CMS</h3>
                <p class="topbar-subtitle">Computer Science Learning Platform</p>
            </div>
            <div class="topbar-right">
                <button id="themeToggle" class="theme-btn" aria-label="Toggle Theme">🌙</button>
                <button class="top-logout" onclick="logout()">Logout</button>
            </div>
        </header>

        <!-- ================= CONTENT ================= -->
        <div class="content">

            <!-- ================= EDITOR SECTION ================= -->
            <section id="blockSection" class="section hidden">
                <div class="editor-header">
                    <div>
                        <h2>✍️ Article Editor</h2>
                        <p class="editor-subtitle">Create high-quality Computer Science tutorials</p>
                    </div>
                    <div class="publish-box">
                        <span id="statusBadge" class="badge draft">Draft</span>
                        <button type="button" id="publishBtn" onclick="publishPost()" class="primary-btn">
                            🚀 Publish
                        </button>
                    </div>
                </div>

                <div class="flex h-[calc(100vh-180px)] bg-white dark:bg-gray-900 border border-gray-200 dark:border-gray-700 rounded-3xl overflow-hidden shadow-sm">

                    <!-- Main Editor Area -->
                    <div class="flex-1 flex flex-col">
                        <!-- Title -->
                        <div class="p-6 border-b border-gray-200 dark:border-gray-700">
                            <input 
                                id="editorTitle"
                                type="text"
                                class="w-full text-3xl font-semibold focus:outline-none bg-transparent"
                                placeholder="Enter article title...">
                        </div>

                        <!-- Toolbar -->
                        <div class="bg-white dark:bg-gray-800 border-b border-gray-200 dark:border-gray-700 p-3 flex items-center gap-2 flex-wrap">
                            <button class="toolbar-btn px-4 py-2 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-lg" onclick="execCmd('bold')"><i class="fas fa-bold"></i></button>
                            <button class="toolbar-btn px-4 py-2 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-lg" onclick="execCmd('italic')"><i class="fas fa-italic"></i></button>
                            <button class="toolbar-btn px-4 py-2 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-lg" onclick="execCmd('underline')"><i class="fas fa-underline"></i></button>
                            <button class="toolbar-btn px-4 py-2 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-lg" onclick="execCmd('strikeThrough')"><i class="fas fa-strikethrough"></i></button>
                            
                            <div class="w-px h-8 bg-gray-300 dark:bg-gray-600 mx-3"></div>
                            
                            <select onchange="execCmd('formatBlock', this.value)" class="border border-gray-300 dark:border-gray-600 rounded-lg px-4 py-2 text-sm">
                                <option value="p">Normal</option>
                                <option value="h1">Heading 1</option>
                                <option value="h2">Heading 2</option>
                                <option value="h3">Heading 3</option>
                            </select>
                            
                            <div class="w-px h-8 bg-gray-300 dark:bg-gray-600 mx-3"></div>
                            
                            <button class="toolbar-btn px-4 py-2 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-lg" onclick="execCmd('insertUnorderedList')"><i class="fas fa-list-ul"></i></button>
                            <button class="toolbar-btn px-4 py-2 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-lg" onclick="execCmd('insertOrderedList')"><i class="fas fa-list-ol"></i></button>
                            <button class="toolbar-btn px-4 py-2 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-lg" onclick="insertImage()"><i class="fas fa-image"></i></button>
                            <button class="toolbar-btn px-4 py-2 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-lg" onclick="insertLink()"><i class="fas fa-link"></i></button>
                            
                            <div class="flex-1"></div>
                            <button onclick="toggleHTML()" class="px-6 py-2 text-sm border border-gray-400 dark:border-gray-600 rounded-xl hover:bg-gray-100 dark:hover:bg-gray-700">HTML</button>
                        </div>

                        <!-- Content Area -->
                        <div id="editor" contenteditable="true" class="flex-1 p-8 overflow-auto text-[17px] leading-relaxed focus:outline-none bg-white dark:bg-gray-900">
                            <p>Start writing your tutorial content here...</p>
                        </div>
                    </div>

                    <!-- Right Sidebar -->
                    <div class="w-96 border-l border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-gray-950 p-6 overflow-auto">
                        <h3 class="font-semibold mb-6">Article Settings</h3>
                        
                        <div class="space-y-6">
                            <div>
                                <label class="block text-sm font-medium mb-2">Subject</label>
                                <select id="editorSubject" class="w-full p-3 border border-gray-300 dark:border-gray-600 rounded-2xl"></select>
                            </div>

                            <div>
                                <label class="block text-sm font-medium mb-2">Topic</label>
                                <select id="editorTopic" class="w-full p-3 border border-gray-300 dark:border-gray-600 rounded-2xl"></select>
                            </div>

                            <div>
                                <label class="block text-sm font-medium mb-2">Featured Image</label>
                                <input type="file" id="imageUpload" accept="image/*" class="w-full">
                            </div>

                            <div>
                                <label class="block text-sm font-medium mb-2">Tags</label>
                                <input id="tags" type="text" placeholder="javascript, beginner, array" class="w-full p-3 border border-gray-300 dark:border-gray-600 rounded-2xl">
                            </div>
                        </div>
                    </div>
                </div>

                <div class="mt-4 flex justify-between items-center text-sm text-gray-500">
                    <span>Auto saved: <span id="saveStatus" class="text-green-600">Ready</span></span>
                    <button onclick="saveDraft()" class="text-orange-600 hover:underline">Save Draft</button>
                </div>
            </section>

        </div>
    </main>
</div>

<!-- ================= ADMIN JS ================= -->
<script defer src="/admin.js?v=5"></script>
</body>
</html>
