```html
<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>EXCEL YOU CMS</title>

    <!-- MAIN CSS -->
    <link
        rel="stylesheet"
        href="/admin.css?v=7"
    >

    <!-- FONT AWESOME -->
    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"
    >

    <!-- DOMPURIFY -->
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.8/dist/purify.min.js"></script>

</head>

<body>

<div class="container">

    <!-- =======================================================
         SIDEBAR
    ======================================================== -->

    <aside
        class="sidebar"
        id="sidebar"
    >

        <!-- LOGO -->
        <div class="sidebar-header">

            <div class="logo-wrapper">

                <!-- LIGHT LOGO -->
                <img
                    src="/logo-light.png"
                    alt="EXCEL YOU"
                    class="logo light-logo"
                >

                <!-- DARK LOGO -->
                <img
                    src="/logo-dark.png"
                    alt="EXCEL YOU"
                    class="logo dark-logo"
                >

            </div>

        </div>


        <!-- MENU -->
        <nav class="sidebar-menu">

            <button
                onclick="showSection('dashboard')"
                class="menu-item active"
            >
                <i class="fas fa-house"></i>
                <span>Dashboard</span>
            </button>

            <button
                onclick="showSection('subject')"
                class="menu-item"
            >
                <i class="fas fa-book"></i>
                <span>Subjects</span>
            </button>

            <button
                onclick="showSection('topic')"
                class="menu-item"
            >
                <i class="fas fa-folder-tree"></i>
                <span>Topics</span>
            </button>

            <button
                onclick="showSection('posts')"
                class="menu-item"
            >
                <i class="fas fa-file-lines"></i>
                <span>Articles</span>
            </button>

            <button
                onclick="showSection('block')"
                class="menu-item"
            >
                <i class="fas fa-pen-to-square"></i>
                <span>Editor</span>
            </button>

        </nav>


        <!-- BOTTOM -->
        <div class="sidebar-bottom">

            <button
                onclick="logout()"
                class="logout-btn"
            >
                <i class="fas fa-right-from-bracket"></i>
                Logout
            </button>

        </div>

    </aside>


    <!-- =======================================================
         OVERLAY
    ======================================================== -->

    <div
        id="overlay"
        class="overlay"
        onclick="closeSidebar()"
    ></div>


    <!-- =======================================================
         MAIN
    ======================================================== -->

    <main class="main">

        <!-- ===================================================
             TOPBAR
        ==================================================== -->

        <header class="topbar">

            <!-- LEFT -->
            <div class="topbar-left">

                <button
                    class="menu-btn"
                    onclick="toggleSidebar()"
                >
                    ☰
                </button>

                <div class="topbar-title-box">

                    <h1 class="page-title">
                        EXCEL YOU CMS
                    </h1>

                    <p class="page-subtitle">
                        Blogger Inspired Content Management System
                    </p>

                </div>

            </div>


            <!-- RIGHT -->
            <div class="topbar-right">

                <button
                    id="themeToggle"
                    class="icon-btn"
                >
                    🌙
                </button>

                <button
                    onclick="togglePreview()"
                    class="preview-btn"
                >
                    <i class="fas fa-eye"></i>
                    Preview
                </button>

            </div>

        </header>


        <!-- ===================================================
             CONTENT
        ==================================================== -->

        <div class="content">

            <!-- ===============================================
                 EDITOR SECTION
            ================================================ -->

            <section
                id="blockSection"
                class="section active"
            >

                <!-- ===========================================
                     ACTION BAR
                ============================================ -->

                <div class="editor-topbar glass-card">

                    <!-- LEFT -->
                    <div class="editor-top-left">

                        <button
                            onclick="history.back()"
                            class="back-btn"
                        >
                            <i class="fas fa-arrow-left"></i>
                        </button>

                        <input
                            id="editorTitle"
                            type="text"
                            class="editor-title-input"
                            placeholder="Enter article title..."
                        >

                    </div>


                    <!-- RIGHT -->
                    <div class="editor-top-right">

                        <button
                            onclick="saveDraft()"
                            class="draft-btn"
                        >
                            Save Draft
                        </button>

                        <button
                            onclick="publishPost()"
                            class="publish-btn"
                        >
                            Publish
                        </button>

                    </div>

                </div>


                <!-- ===========================================
                     MAIN EDITOR LAYOUT
                ============================================ -->

                <div class="editor-layout">

                    <!-- =======================================
                         MAIN EDITOR
                    ======================================== -->

                    <div class="editor-main glass-card">

                        <!-- TOOLBAR -->
                        <div class="editor-toolbar">

                            <button onclick="execCmd('bold')">
                                <i class="fas fa-bold"></i>
                            </button>

                            <button onclick="execCmd('italic')">
                                <i class="fas fa-italic"></i>
                            </button>

                            <button onclick="execCmd('underline')">
                                <i class="fas fa-underline"></i>
                            </button>

                            <button onclick="execCmd('strikeThrough')">
                                <i class="fas fa-strikethrough"></i>
                            </button>

                            <span class="divider"></span>

                            <button onclick="execCmd('insertUnorderedList')">
                                <i class="fas fa-list-ul"></i>
                            </button>

                            <button onclick="execCmd('insertOrderedList')">
                                <i class="fas fa-list-ol"></i>
                            </button>

                            <button onclick="execCmd('justifyLeft')">
                                <i class="fas fa-align-left"></i>
                            </button>

                            <button onclick="execCmd('justifyCenter')">
                                <i class="fas fa-align-center"></i>
                            </button>

                            <button onclick="execCmd('justifyRight')">
                                <i class="fas fa-align-right"></i>
                            </button>

                            <span class="divider"></span>

                            <button onclick="insertImage()">
                                <i class="fas fa-image"></i>
                            </button>

                            <button onclick="insertLink()">
                                <i class="fas fa-link"></i>
                            </button>

                            <button onclick="toggleHTML()">
                                HTML
                            </button>

                        </div>


                        <!-- EDITOR -->
                        <div
                            id="editor"
                            contenteditable="true"
                            class="editor-area"
                        >

                            <h2>
                                Welcome to EXCEL YOU CMS
                            </h2>

                            <p>
                                Start writing your article here...
                            </p>

                        </div>

                    </div>


                    <!-- =======================================
                         SETTINGS SIDEBAR
                    ======================================== -->

                    <aside class="editor-sidebar glass-card">

                        <h3>
                            Post Settings
                        </h3>


                        <!-- SUBJECT -->
                        <div class="setting-group">

                            <label>
                                Subject
                            </label>

                            <select id="editorSubject">

                                <option value="">
                                    Select Subject
                                </option>

                            </select>

                        </div>


                        <!-- TOPIC -->
                        <div class="setting-group">

                            <label>
                                Topic
                            </label>

                            <select id="editorTopic">

                                <option value="">
                                    Select Topic
                                </option>

                            </select>

                        </div>


                        <!-- FEATURED IMAGE -->
                        <div class="setting-group">

                            <label>
                                Featured Image
                            </label>

                            <div class="upload-box">

                                <i class="fas fa-cloud-arrow-up"></i>

                                <p>
                                    Upload Image
                                </p>

                                <input
                                    type="file"
                                    id="featuredImage"
                                    hidden
                                >

                            </div>

                        </div>


                        <!-- STATUS -->
                        <div class="setting-group">

                            <label>
                                Status
                            </label>

                            <div class="status-badge draft">
                                Draft
                            </div>

                        </div>

                    </aside>

                </div>


                <!-- ===========================================
                     PREVIEW
                ============================================ -->

                <div
                    id="previewBox"
                    class="preview-box glass-card hidden"
                ></div>

            </section>

        </div>

    </main>

</div>


<!-- =======================================================
     JS
======================================================= -->

<script
    defer
    src="/admin.js?v=7"
></script>

</body>
</html>
```
