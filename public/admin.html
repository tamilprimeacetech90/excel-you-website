<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>EXCEL YOU Admin</title>

    <!-- MAIN CSS -->
    <link
        rel="stylesheet"
        href="/admin.css?v=5"
    >

    <!-- QUILL CSS -->
    <link
        rel="stylesheet"
        href="https://cdn.quilljs.com/1.3.6/quill.snow.css"
    >

    <!-- IMAGE UPLOADER CSS -->
    <link
        rel="stylesheet"
        href="https://unpkg.com/quill-image-uploader@1.2.3/dist/quill.imageUploader.min.css"
    >

    <!-- GOOGLE FONT -->
    <link
        rel="preconnect"
        href="https://fonts.googleapis.com"
    >

    <link
        rel="preconnect"
        href="https://fonts.gstatic.com"
        crossorigin
    >

    <!-- DOMPURIFY -->
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.8/dist/purify.min.js"></script>

    <!-- QUILL -->
    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>

    <!-- IMAGE RESIZE -->
    <script src="https://cdn.jsdelivr.net/npm/quill-image-resize-module@3.0.0/image-resize.min.js"></script>

    <!-- IMAGE UPLOADER -->
    <script src="https://unpkg.com/quill-image-uploader@1.2.3/dist/quill.imageUploader.min.js"></script>

    <!-- CHART -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<div class="container">

    <!-- ================= SIDEBAR ================= -->

    <aside
        class="sidebar"
        id="sidebar"
    >

        <div class="sidebar-top">

    <div class="logo-box">

    <!-- LIGHT THEME LOGO -->
    <img
        src="/full-logo5.png"
        alt="EXCEL YOU"
        class="logo light-logo"
    >

    <!-- DARK THEME LOGO -->
    <img
        src="/full-logo-white.png"
        alt="EXCEL YOU"
        class="logo dark-logo"
    >

</div>


            <p class="sidebar-subtitle">
                Admin Panel
            </p>

        </div>

        <nav class="sidebar-menu">

            <button
                type="button"
                onclick="showSection('dashboard')"
            >
                🏠 Dashboard
            </button>

            <button
                type="button"
                onclick="showSection('subject')"
            >
                📘 Subjects
            </button>

            <button
                type="button"
                onclick="showSection('topic')"
            >
                📖 Topics
            </button>

            <button
                type="button"
                onclick="showSection('posts')"
            >
                📝 Articles
            </button>

            <button
                type="button"
                onclick="showSection('block')"
            >
                ✍️ Editor
            </button>

        </nav>

        <div class="sidebar-bottom">

            <button
                type="button"
                class="logout-btn"
                onclick="logout()"
            >
                🚪 Logout
            </button>

        </div>

    </aside>

    <!-- ================= MOBILE OVERLAY ================= -->

    <div
        id="overlay"
        class="overlay"
        onclick="closeSidebar()"
    ></div>

    <!-- ================= MAIN ================= -->

    <main class="main">

        <!-- ================= TOPBAR ================= -->

        <header class="topbar">

            <button
                class="menu-btn"
                type="button"
                onclick="toggleSidebar()"
                aria-label="Open Menu"
            >
                ☰
            </button>

            <div class="topbar-left">

                <h3>EXCEL YOU CMS</h3>

                <p class="topbar-subtitle">
                    Content Management System
                </p>

            </div>

            <div class="topbar-right">

                <!-- THEME TOGGLE -->

                <button
                    id="themeToggle"
                    class="theme-btn"
                    type="button"
                    aria-label="Toggle Theme"
                >
                    🌙
                </button>

                <!-- LOGOUT -->

                <button
                    class="top-logout"
                    type="button"
                    onclick="logout()"
                >
                    Logout
                </button>

            </div>

        </header>

        <!-- ================= CONTENT ================= -->

        <div class="content">

            <!-- ================= DASHBOARD ================= -->

            <section
                id="dashboardSection"
                class="section"
            >

                <div class="dashboard-header">

                    <h1>👋 Welcome Admin</h1>

                    <p>
                        Manage subjects, topics, articles and content.
                    </p>

                </div>

                <!-- STATS -->
                <div id="statsBox"></div>

                <!-- CHART -->
                <canvas
                    id="mainChart"
                    height="100"
                ></canvas>

            </section>

            <!-- ================= SUBJECT SECTION ================= -->

            <section
                id="subjectSection"
                class="section hidden"
            >

                <h2>📘 Create Subject</h2>

                <div class="form-grid">

                    <input
                        id="subjectName"
                        type="text"
                        placeholder="Subject Name"
                    >

                    <input
                        id="subjectDesc"
                        type="text"
                        placeholder="Description"
                    >

                    <select id="subjectLang">

                        <option value="en">
                            English
                        </option>

                        <option value="ta">
                            Tamil
                        </option>

                    </select>

                </div>

                <button
                    type="button"
                    class="primary-btn"
                    onclick="addSubject()"
                >
                    + Create Subject
                </button>

                <hr>

                <h3>📚 Subject List</h3>

                <div id="subjectList"></div>

            </section>

            <!-- ================= TOPIC SECTION ================= -->

            <section
                id="topicSection"
                class="section hidden"
            >

                <h2>📖 Create Topic</h2>

                <div class="form-grid">

                    <input
                        id="topicTitle"
                        type="text"
                        placeholder="Topic Title"
                    >

                    <select id="subjectId">

                        <option value="">
                            Select Subject
                        </option>

                    </select>

                    <select id="topicLang">

                        <option value="en">
                            English
                        </option>

                        <option value="ta">
                            Tamil
                        </option>

                    </select>

                </div>

                <button
                    type="button"
                    class="primary-btn"
                    onclick="addTopic()"
                >
                    + Create Topic
                </button>

            </section>

            <!-- ================= POSTS SECTION ================= -->

            <section
                id="postsSection"
                class="section hidden"
            >

                <div class="posts-header">

                    <div>

                        <h2>📝 Manage Articles</h2>

                        <p>
                            Edit published and draft articles
                        </p>

                    </div>

                    <div class="filters">

                        <select
                            id="filterSubject"
                            onchange="loadPosts()"
                        >

                            <option value="">
                                All Subjects
                            </option>

                        </select>

                        <select
                            id="filterVisibility"
                            onchange="loadPosts()"
                        >

                            <option value="">
                                All Status
                            </option>

                            <option value="public">
                                Published
                            </option>

                            <option value="draft">
                                Draft
                            </option>

                        </select>

                        <input
                            type="text"
                            id="searchPost"
                            placeholder="Search article..."
                            oninput="loadPosts()"
                        >

                    </div>

                </div>

                <div id="postsList"></div>

            </section>

            <!-- ================= EDITOR SECTION ================= -->

            <section
                id="blockSection"
                class="section hidden"
            >

                <div class="editor-header">

                    <div>

                        <h2>✍️ Article Editor</h2>

                        <p class="editor-subtitle">
                            Create and edit blog articles
                        </p>

                    </div>

                    <div class="publish-box">

                        <span
                            id="statusBadge"
                            class="badge draft"
                        >
                            Draft
                        </span>

                        <button
                            type="button"
                            id="publishBtn"
                            onclick="togglePublish()"
                        >
                            🚀 Publish
                        </button>

                    </div>

                </div>

                <!-- HIDDEN ID -->

                <input
                    type="hidden"
                    id="topicId"
                >

                <!-- SUBJECT + TOPIC -->

                <div class="editor-grid">

                    <div class="editor-field">

                        <label for="editorSubject">
                            📘 Subject
                        </label>

                        <select
                            id="editorSubject"
                            onchange="loadTopicsForEditor()"
                        >

                            <option value="">
                                Select Subject
                            </option>

                        </select>

                    </div>

                    <div class="editor-field">

                        <label for="editorTopic">
                            📖 Article
                        </label>

                        <select
                            id="editorTopic"
                            onchange="openSelectedTopic()"
                        >

                            <option value="">
                                Select Article
                            </option>

                        </select>

                    </div>

                </div>

                <!-- TITLE -->

                <div class="editor-field">

                    <label for="editorTitle">
                        ✍️ Article Title
                    </label>

                    <input
                        id="editorTitle"
                        type="text"
                        class="editor-title"
                        placeholder="Enter article title..."
                    >

                </div>

                <!-- ACTIONS -->

                <div class="editor-actions">

                    <button
                        type="button"
                        class="new-post-btn"
                        onclick="createNewArticle()"
                    >
                        ➕ Create New Article
                    </button>

                </div>

                <!-- IMAGE -->

                <div class="editor-field">

                    <label for="imageUpload">
                        🖼 Upload Image
                    </label>

                    <input
                        type="file"
                        id="imageUpload"
                        accept="image/*"
                    >

                </div>

                <!-- QUILL -->

                <div id="editor"></div>

                <!-- SAVE STATUS -->

                <p id="saveStatus">
                    Ready
                </p>

                <!-- PREVIEW -->

                <div id="previewBox"></div>

            </section>

        </div>

    </main>

</div>

<!-- ================= ADMIN JS ================= -->

<script
    defer
    src="/admin.js?v=5"
></script>

</body>
</html>
