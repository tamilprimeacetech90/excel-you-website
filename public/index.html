<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#07111f" />

  <title>EXCEL YOU</title>

  <link rel="icon" type="image/png" href="/assets/logo/favicon.png" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>

    /* ================= THEME ================= */

    :root {
      --bg: #ffffff;
      --text: #07111f;
      --card: #ffffff;
      --border: rgba(0,0,0,0.08);
      --muted: #475569;
      --nav: rgba(255,255,255,0.85);
      --primary: #2563eb;
      --secondary: #7c3aed;
    }

    [data-theme="dark"] {
      --bg: #07111f;
      --text: #ffffff;
      --card: rgba(255,255,255,0.06);
      --border: rgba(255,255,255,0.08);
      --muted: #94a3b8;
      --nav: rgba(6,11,20,0.75);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      transition: 0.3s;
      overflow-x: hidden;
    }

    a { text-decoration: none; color: inherit; }

    /* ================= NAV ================= */

    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 5%;
      position: sticky;
      top: 0;
      z-index: 1000;
      background: var(--nav);
      backdrop-filter: blur(15px);
      border-bottom: 1px solid var(--border);
    }

    .logo-img {
      width: 170px;
    }

    .links {
      display: flex;
      gap: 18px;
      align-items: center;
    }

    .links a:hover {
      color: #60a5fa;
    }

    .nav-btn {
      padding: 10px 16px;
      border-radius: 20px;
      background: linear-gradient(135deg,var(--primary),var(--secondary));
      color: white;
    }

    .theme-btn {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      background: linear-gradient(135deg,var(--primary),var(--secondary));
      color: white;
    }

    .menu-toggle {
      display: none;
      font-size: 26px;
      background: none;
      border: none;
      color: var(--text);
    }

    /* ================= HERO ================= */

    .hero {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 80px 8%;
      flex-wrap: wrap;
      gap: 40px;
    }

    .hero-left {
      flex: 1;
      min-width: 300px;
    }

    .hero h1 {
      font-size: 48px;
      margin-bottom: 20px;
    }

    .hero p {
      color: var(--muted);
      margin-bottom: 25px;
      line-height: 1.7;
    }

    .hero-buttons {
      display: flex;
      gap: 15px;
      flex-wrap: wrap;
    }

    .primary-btn,
    .secondary-btn {
      padding: 12px 18px;
      border-radius: 12px;
      font-weight: 600;
    }

    .primary-btn {
      background: linear-gradient(135deg,var(--primary),var(--secondary));
      color: white;
    }

    .secondary-btn {
      border: 1px solid var(--border);
    }

    /* ================= SUBJECTS ================= */

    .section {
      padding: 80px 8%;
    }

    .section-title {
      text-align: center;
      margin-bottom: 40px;
    }

    .subjects-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit,minmax(250px,1fr));
      gap: 20px;
    }

    .subject-card {
      background: var(--card);
      border: 1px solid var(--border);
      padding: 20px;
      border-radius: 18px;
      transition: 0.3s;
      cursor: pointer;
    }

    .subject-card:hover {
      transform: translateY(-6px);
    }

    /* ================= FOOTER ================= */

    footer {
      text-align: center;
      padding: 40px;
      border-top: 1px solid var(--border);
      color: var(--muted);
    }

    /* ================= MOBILE ================= */

    @media(max-width:768px){
      .menu-toggle { display:block; }
      .links {
        display:none;
        position:absolute;
        top:70px;
        left:0;
        width:100%;
        flex-direction:column;
        background: var(--nav);
        padding:20px;
      }
      .links.active { display:flex; }
      .hero { text-align:center; justify-content:center; }
    }

  </style>

</head>

<body data-theme="dark">

  <!-- NAV -->
  <nav class="navbar">

    <img src="/assets/logo/full-logo.png" class="logo-img" />

    <button class="menu-toggle" id="menuToggle">☰</button>

    <div class="links" id="navLinks">

      <a href="/">Home</a>
      <a href="/subjects">Subjects</a>
      <a href="/student">Learn</a>
      <a href="/about">About</a>
      <a href="/contact">Contact</a>

      <button id="themeToggle" class="theme-btn">🌙</button>

      <a href="/login" class="nav-btn">Admin</a>

    </div>

  </nav>

  <!-- HERO -->
  <section class="hero">

    <div class="hero-left">

      <h1>Learn Smarter With EXCEL YOU</h1>

      <p>
        Modern Tamil + English LMS platform with structured learning system.
      </p>

      <div class="hero-buttons">
        <a href="/student" class="primary-btn">Start Learning</a>
        <a href="/subjects" class="secondary-btn">Browse Subjects</a>
      </div>

    </div>

  </section>

  <!-- SUBJECTS -->
  <section class="section">

    <div class="section-title">
      <h2>Popular Subjects</h2>
    </div>

    <div class="subjects-grid" id="subjectsContainer">
      <p>Loading...</p>
    </div>

  </section>

  <!-- FOOTER -->
  <footer>
    © 2026 EXCEL YOU
  </footer>

  <script>

    // MENU
    document.getElementById("menuToggle")
    .addEventListener("click", () => {
      document.getElementById("navLinks").classList.toggle("active");
    });

    // THEME (FINAL CLEAN)
    const themeBtn = document.getElementById("themeToggle");

    function setTheme(theme){
      document.body.setAttribute("data-theme", theme);
      themeBtn.innerHTML = theme === "dark" ? "☀️" : "🌙";
      localStorage.setItem("theme", theme);
    }

    setTheme(localStorage.getItem("theme") || "dark");

    themeBtn.addEventListener("click", () => {
      const current = document.body.getAttribute("data-theme");
      setTheme(current === "dark" ? "light" : "dark");
    });

    // LOAD DATA
    async function loadHomepage(){

      try {

        const res = await fetch("/api/homepage");
        const data = await res.json();

        const container = document.getElementById("subjectsContainer");
        container.innerHTML = "";

        data.subjects.forEach(s => {

          container.innerHTML += `
            <div class="subject-card">
              <h3>${s.name}</h3>
              <p>${(s.description || "").substring(0,120)}...</p>
            </div>
          `;

        });

      } catch(err){
        console.error(err);
      }

    }

    loadHomepage();

  </script>

</body>
</html>
