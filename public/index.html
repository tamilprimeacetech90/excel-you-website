<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#07111f" />

  <title>EXCEL YOU</title>

  <link rel="icon" type="image/png" href="/assets/logo/favicon.png" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #ffffff;
      --text: #07111f;
      --card: rgba(255,255,255,0.8);
      --border: rgba(15,23,42,0.08);
      --muted: #475569;
      --glass: rgba(255,255,255,0.6);
      --primary: #2563eb;
      --secondary: #7c3aed;
    }

    [data-theme="dark"] {
      --bg: #07111f;
      --text: #ffffff;
      --card: rgba(255,255,255,0.06);
      --border: rgba(255,255,255,0.08);
      --muted: #94a3b8;
      --glass: rgba(255,255,255,0.05);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Poppins', sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow-x: hidden;
      transition: 0.3s;
    }

    a { text-decoration: none; }

    img { max-width: 100%; display: block; }

    .bg-glow {
      position: fixed;
      width: 500px;
      height: 500px;
      border-radius: 50%;
      filter: blur(120px);
      opacity: 0.18;
      z-index: -1;
    }

    .glow1 { background: #2563eb; top: -120px; left: -100px; }
    .glow2 { background: #9333ea; bottom: -120px; right: -100px; }

    .navbar {
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 5%;
      position: sticky;
      top: 0;
      z-index: 1000;
      backdrop-filter: blur(18px);
      background: rgba(6,11,20,0.72);
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .logo-img {
      width: clamp(140px, 18vw, 240px);
      height: auto;
    }

    .links {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .links a {
      color: var(--text);
      font-size: 15px;
      transition: 0.3s;
    }

    .nav-btn {
      padding: 11px 18px;
      border-radius: 999px;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: white !important;
      font-weight: 600;
    }

    .theme-btn {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: white;
      font-size: 18px;
    }

    .menu-toggle {
      display: none;
      background: transparent;
      border: none;
      color: var(--text);
      font-size: 30px;
      cursor: pointer;
    }

    .hero {
      min-height: 90vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 100px 8%;
      gap: 60px;
      flex-wrap: wrap;
    }

    .hero-badge {
      display: inline-block;
      padding: 10px 18px;
      border-radius: 999px;
      background: var(--glass);
      border: 1px solid var(--border);
      margin-bottom: 24px;
      color: var(--muted);
    }

    .hero h1 {
      font-size: clamp(42px, 6vw, 70px);
      margin-bottom: 24px;
    }

    .hero h1 span {
      background: linear-gradient(135deg, #60a5fa, #a855f7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .hero p {
      font-size: 18px;
      color: var(--muted);
      margin-bottom: 34px;
    }

    .primary-btn, .secondary-btn {
      padding: 16px 28px;
      border-radius: 16px;
      font-weight: 600;
    }

    .primary-btn {
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: white;
    }

    .secondary-btn {
      border: 1px solid var(--border);
      background: var(--glass);
      color: var(--text);
    }

    .dashboard-card {
      width: 100%;
      max-width: 480px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 28px;
      padding: 28px;
    }

    .dashboard-grid {
      display: grid;
      grid-template-columns: repeat(2,1fr);
      gap: 18px;
    }

    .mini-card {
      background: var(--glass);
      padding: 20px;
      border-radius: 18px;
      border: 1px solid var(--border);
    }

    .section {
      padding: 100px 8%;
    }

    .subjects-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit,minmax(280px,1fr));
      gap: 24px;
    }

    .subject-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 28px;
    }

    footer {
      margin-top: 100px;
      padding: 40px 8%;
      border-top: 1px solid var(--border);
      text-align: center;
      color: var(--muted);
    }

    @media(max-width:768px){
      .menu-toggle { display: block; }

      .links {
        position: absolute;
        top: 82px;
        left: 0;
        width: 100%;
        background: rgba(6,11,20,0.96);
        flex-direction: column;
        display: none;
        padding: 30px 0;
      }

      .links.active { display: flex; }
    }
  </style>

</head>

<body data-theme="dark">

<div class="bg-glow glow1"></div>
<div class="bg-glow glow2"></div>

<nav class="navbar">

  <a href="/">
    <img src="/assets/logo/full-logo.png" class="logo-img" />
  </a>

  <button class="menu-toggle" id="menuToggle">☰</button>

  <div class="links" id="navLinks">

    <a href="/">Home</a>
    <a href="/subjects">Subjects</a>
    <a href="/student">Learn</a>
    <a href="/about">About</a>
    <a href="/contact">Contact</a>

    <button id="themeToggle" class="theme-btn">🌙</button>

    <a href="/login" class="nav-btn">Admin</a>

  </div>

</nav>

<section class="hero">

  <div class="hero-left">

    <div class="hero-badge">🚀 Modern LMS Platform</div>

    <h1>Learn Smarter With <span>EXCEL YOU</span></h1>

    <p>Modern Tamil + English learning platform</p>

    <a href="/student" class="primary-btn">Start Learning</a>
    <a href="/subjects" class="secondary-btn">Browse Subjects</a>

  </div>

  <div class="hero-right">

    <div class="dashboard-card">

      <h2>Dashboard</h2>

      <div class="dashboard-grid">

        <div class="mini-card">
          <h3 id="subjectCount">0+</h3>
          <p>Subjects</p>
        </div>

        <div class="mini-card">
          <h3 id="topicCount">0+</h3>
          <p>Topics</p>
        </div>

      </div>

    </div>

  </div>

</section>

<section class="section">

  <div class="subjects-grid" id="subjectsContainer"></div>

</section>

<footer>
  © 2026 EXCEL YOU
</footer>

<script>

const menuToggle = document.getElementById("menuToggle");
const navLinks = document.getElementById("navLinks");

menuToggle.onclick = () => {
  navLinks.classList.toggle("active");
};

const themeBtn = document.getElementById("themeToggle");

function applyTheme(theme){
  document.body.setAttribute("data-theme", theme);
  themeBtn.innerHTML = theme === "dark" ? "☀️" : "🌙";
  localStorage.setItem("theme", theme);
}

applyTheme(localStorage.getItem("theme") || "dark");

themeBtn.onclick = () => {
  const current = document.body.getAttribute("data-theme");
  applyTheme(current === "dark" ? "light" : "dark");
};

async function loadHomepage(){
  const res = await fetch("/api/homepage");
  const data = await res.json();

  document.getElementById("subjectCount").innerText =
    data.stats.totalSubjects + "+";

  document.getElementById("topicCount").innerText =
    data.stats.totalTopics + "+";

  const container = document.getElementById("subjectsContainer");
  container.innerHTML = "";

  data.subjects.forEach(s => {
    container.innerHTML += `
      <div class="subject-card">
        <h3>${s.name}</h3>
        <p>${s.description.substring(0,140)}...</p>
      </div>
    `;
  });
}

loadHomepage();

</script>

</body>
</html>
