<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>EXCEL YOU</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      color: white;
      min-height: 100vh;
    }

    /* NAVBAR */
    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 60px;
      background: rgba(0,0,0,0.2);
      backdrop-filter: blur(10px);
    }

    nav h2 {
      font-size: 22px;
      letter-spacing: 1px;
    }

    nav a {
      color: white;
      text-decoration: none;
      margin-left: 20px;
      font-size: 16px;
    }

    nav a:hover {
      text-decoration: underline;
    }

    /* HERO SECTION */
    .hero {
      text-align: center;
      margin-top: 120px;
      padding: 20px;
    }

    .hero h1 {
      font-size: 55px;
      margin-bottom: 15px;
    }

    .hero p {
      font-size: 20px;
      opacity: 0.9;
      margin-bottom: 30px;
    }

    .btn {
      padding: 12px 25px;
      background: white;
      color: #2a5298;
      border: none;
      border-radius: 30px;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }

    .btn:hover {
      background: #ddd;
      transform: scale(1.05);
    }

    /* FEATURES */
    .features {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 80px;
      gap: 20px;
    }

    .card {
      background: rgba(255,255,255,0.1);
      padding: 20px;
      width: 250px;
      border-radius: 15px;
      backdrop-filter: blur(10px);
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-10px);
    }

    .card h3 {
      margin-bottom: 10px;
    }

    footer {
      text-align: center;
      margin-top: 80px;
      padding: 20px;
      background: rgba(0,0,0,0.2);
    }

    @media(max-width:768px){
      nav {
        flex-direction: column;
      }

      .hero h1 {
        font-size: 35px;
      }
    }
  </style>
</head>

<body>

  <!-- NAVBAR -->
  <nav>
    <h2>EXCEL YOU 🚀</h2>
    <div>
      <a href="/">Home</a>
      <a href="/about">About</a>
      <a href="/contact">Contact</a>
      <a href="/login">Login</a>
    </div>
  </nav>

  <!-- HERO -->
  <div class="hero">
    <h1>Welcome to EXCEL YOU</h1>
    <p>Modern Full Stack Node.js Website</p>
    <a href="/contact"><button class="btn">Get Started</button></a>
  </div>

  <!-- FEATURES -->
  <div class="features">
    <div class="card">
      <h3>⚡ Fast</h3>
      <p>Optimized Node.js backend for speed.</p>
    </div>

    <div class="card">
      <h3>🌐 Live</h3>
      <p>Deployed on Render cloud hosting.</p>
    </div>

    <div class="card">
      <h3>💡 Modern</h3>
      <p>Clean UI with gradient design.</p>
    </div>
  </div>

  <!-- FOOTER -->
  <footer>
    © 2026 EXCEL YOU | Built with Node.js 🚀
  </footer>

</body>
</html>
