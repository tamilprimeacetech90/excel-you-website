<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>EXCEL YOU - Editor</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

<link rel="stylesheet" href="/admin/css/admineditor.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.css">

<!-- CKEDITOR 5 -->
<script src="https://cdn.ckeditor.com/ckeditor5/41.4.2/classic/ckeditor.js"></script>

</head>

<body>

<div class="container">

<!-- ================= SIDEBAR (UNCHANGED) ================= -->
<aside class="sidebar" id="sidebar">

    <div>

        <div class="logo">
            <img id="siteLogo" src="/assets/full-logo.png" class="logo-image">
        </div>

        <div class="sidebar-menu">
            <a href="/admin/admindashboard.html"><i class="fas fa-chart-pie"></i><span>Dashboard</span></a>
            <a href="/admin/adminsubjects.html"><i class="fas fa-book"></i><span>Subjects</span></a>
            <a href="/admin/admintopics.html"><i class="fas fa-layer-group"></i><span>Topics</span></a>
            <a href="/admin/adminarticles.html"><i class="fas fa-newspaper"></i><span>Articles</span></a>
            <a href="/admin/admineditor.html" class="active"><i class="fas fa-pen"></i><span>Editor</span></a>
        </div>

    </div>

    <div class="sidebar-menu">
        <a href="#" onclick="logout()" class="logout-btn">
            <i class="fas fa-right-from-bracket"></i><span>Logout</span>
        </a>
    </div>

</aside>

<!-- ================= MAIN ================= -->
<main class="main">

<!-- TOPBAR -->
<div class="topbar">

    <div class="topbar-left">
        <button class="mobile-toggle" id="mobileToggle">☰</button>

        <div>
            <h1>Article Editor</h1>
            <p>Create and manage articles</p>
        </div>
    </div>

    <div class="topbar-right">
        <button class="theme-toggle" id="themeToggle">🌙</button>
    </div>

</div>

<!-- CONTENT -->
<div class="content">

<!-- HEADER -->
<div class="editor-header">

    <div class="editor-title-wrap">

        <input type="text" id="articleTitle"
        placeholder="Write article title..."
        class="editor-title">

        <div class="editor-meta">
            <span id="saveStatus">Draft not saved</span>
            <span>Last edited just now</span>
        </div>

    </div>

    <div class="editor-actions">

        <button onclick="saveDraft()" class="draft-btn">
            <i class="fas fa-floppy-disk"></i> Save Draft
        </button>

        <button onclick="publishArticle()" class="publish-btn">
            <i class="fas fa-paper-plane"></i> Publish
        </button>

    </div>

</div>

<!-- ================= EDITOR TOOLBAR (YOUR UI) ================= -->
<div class="toolbar">

    <button onclick="editor.execute('undo')"><i class="fas fa-undo"></i></button>
    <button onclick="editor.execute('redo')"><i class="fas fa-redo"></i></button>

    <div class="toolbar-divider"></div>

    <button onclick="editor.execute('bold')"><i class="fas fa-bold"></i></button>
    <button onclick="editor.execute('italic')"><i class="fas fa-italic"></i></button>
    <button onclick="editor.execute('underline')"><i class="fas fa-underline"></i></button>
    <button onclick="editor.execute('strikethrough')"><i class="fas fa-strikethrough"></i></button>

    <div class="toolbar-divider"></div>

    <button onclick="editor.execute('bulletedList')"><i class="fas fa-list-ul"></i></button>
    <button onclick="editor.execute('numberedList')"><i class="fas fa-list-ol"></i></button>

    <div class="toolbar-divider"></div>

    <button onclick="insertLink()"><i class="fas fa-link"></i></button>
    <button onclick="insertImage()"><i class="fas fa-image"></i></button>
    <button onclick="insertVideo()"><i class="fas fa-video"></i></button>

</div>

<!-- ================= EDITOR AREA ================= -->
<div class="editor-wrapper">

    <div id="editor"></div>

</div>

<!-- RIGHT SIDEBAR (UNCHANGED) -->
<div class="editor-sidebar">

    <div class="sidebar-card">
        <h3>Article Settings</h3>

        <select><option>Subject</option></select>
        <select><option>Topic</option></select>
        <select><option>Draft</option></select>
    </div>

    <div class="sidebar-card">
        <h3>Featured Image</h3>
        <div id="thumbnailPreview"></div>

        <div class="upload-box">
            <input type="file" id="thumbnailInput" hidden>
            <i class="fas fa-image"></i>
            <p>Upload Thumbnail</p>
        </div>
    </div>

    <div class="sidebar-card">
        <h3>SEO Settings</h3>
        <input placeholder="Tags">
        <input placeholder="URL Slug">
    </div>

</div>

</div>
</main>
</div>

<!-- ================= SCRIPT ================= -->
<script>

let editor;

// INIT CKEDITOR
ClassicEditor
.create(document.querySelector("#editor"), {
    toolbar: []
})
.then(ed => {
    editor = ed;
})
.catch(err => console.error(err));

/* ================= LINK ================= */
function insertLink() {
    const url = prompt("Enter URL");
    if (!url) return;
    editor.execute("link", url);
}

/* ================= IMAGE ================= */
function insertImage() {
    const input = document.createElement("input");
    input.type = "file";
    input.accept = "image/*";
    input.click();

    input.onchange = () => {
        const file = input.files[0];
        const reader = new FileReader();

        reader.onload = e => {
            editor.execute("insertImage", {
                source: e.target.result
            });
        };

        reader.readAsDataURL(file);
    };
}

/* ================= VIDEO ================= */
function insertVideo() {
    const url = prompt("YouTube URL");
    if (!url) return;

    let id = url.includes("watch?v=")
        ? url.split("watch?v=")[1].split("&")[0]
        : url.split("youtu.be/")[1];

    const embed = `https://www.youtube.com/embed/${id}`;

    editor.setData(
        editor.getData() +
        `<figure class="media"><oembed url="${embed}"></oembed></figure>`
    );
}

/* ================= SAVE ================= */
function saveDraft() {
    localStorage.setItem("draft", editor.getData());
    document.getElementById("saveStatus").innerText = "Draft saved ✔";
}

function publishArticle() {
    console.log(editor.getData());
    document.getElementById("saveStatus").innerText = "Published ✔";
}

/* ================= LOGOUT ================= */
function logout() {
    localStorage.clear();
    window.location.href = "/login.html";
}

</script>

</body>
</html>
