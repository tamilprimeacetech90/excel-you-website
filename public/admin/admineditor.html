<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
EXCEL YOU - Editor
</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

<link rel="stylesheet"
href="/css/admineditor.css">

</head>

<body>

<div class="container">

    <!-- =====================================================
       SIDEBAR
    ====================================================== -->

    <aside class="sidebar"
    id="sidebar">

        <div>

            <!-- LOGO -->

            <div class="logo">

                <img
                id="siteLogo"
                src="/assets/full-logo.png"
                alt="EXCEL YOU"
                class="logo-image">

            </div>

            <!-- MENU -->

            <div class="sidebar-menu">

                <a href="/admin/admindashboard.html">
                    <i class="fas fa-chart-pie"></i>
                    <span>Dashboard</span>
                </a>

                <a href="/admin/adminsubjects.html">
                    <i class="fas fa-book"></i>
                    <span>Subjects</span>
                </a>

                <a href="/admin/admintopics.html">
                    <i class="fas fa-layer-group"></i>
                    <span>Topics</span>
                </a>

                <a href="/admin/adminarticles.html">
                    <i class="fas fa-newspaper"></i>
                    <span>Articles</span>
                </a>

                <a href="/admin/admineditor.html"
                class="active">
                    <i class="fas fa-pen"></i>
                    <span>Editor</span>
                </a>

            </div>

        </div>

        <!-- LOGOUT -->

        <div class="sidebar-menu">

            <a
            href="#"
            class="logout-btn"
            onclick="logout()">

                <i class="fas fa-right-from-bracket"></i>

                <span>Logout</span>

            </a>

        </div>

    </aside>

    <!-- =====================================================
       MAIN
    ====================================================== -->

    <main class="main">

        <!-- =================================================
           TOPBAR
        ================================================== -->

        <div class="topbar">

            <div class="topbar-left">

                <button
                class="mobile-toggle"
                id="mobileToggle">

                    ☰

                </button>

                <div>

                    <h1>Article Editor</h1>

                    <p>
                        Create and manage articles
                    </p>

                </div>

            </div>

            <div class="topbar-right">

                <button
                class="theme-toggle"
                id="themeToggle">

                    🌙

                </button>

            </div>

        </div>

        <!-- =================================================
           CONTENT
        ================================================== -->

        <div class="content">

            <!-- =============================================
               EDITOR HEADER
            ============================================== -->

            <div class="editor-header">

                <div class="editor-title-wrap">

                    <input
                    type="text"
                    id="articleTitle"
                    placeholder="Write article title..."
                    class="editor-title">

                </div>

                <div class="editor-actions">

                    <button
                    class="draft-btn">

                        Save Draft

                    </button>

                    <button
                    class="publish-btn">

                        Publish

                    </button>

                </div>

            </div>

            <!-- =============================================
               EDITOR LAYOUT
            ============================================== -->

            <div class="editor-layout">

                <!-- =========================================
                   LEFT EDITOR
                ========================================== -->

                <div class="editor-main">

                    <!-- TOOLBAR -->

                    <div class="toolbar">

                        <button>
                            <i class="fas fa-bold"></i>
                        </button>

                        <button>
                            <i class="fas fa-italic"></i>
                        </button>

                        <button>
                            <i class="fas fa-underline"></i>
                        </button>

                        <button>
                            <i class="fas fa-strikethrough"></i>
                        </button>

                        <div class="toolbar-divider"></div>

                        <button>
                            <i class="fas fa-heading"></i>
                        </button>

                        <button>
                            <i class="fas fa-list-ul"></i>
                        </button>

                        <button>
                            <i class="fas fa-list-ol"></i>
                        </button>

                        <button>
                            <i class="fas fa-quote-left"></i>
                        </button>

                        <div class="toolbar-divider"></div>

                        <button>
                            <i class="fas fa-link"></i>
                        </button>

                        <button>
                            <i class="fas fa-image"></i>
                        </button>

                        <button>
                            <i class="fas fa-video"></i>
                        </button>

                        <div class="toolbar-divider"></div>

                        <button>
                            HTML
                        </button>

                    </div>

                    <!-- EDITOR -->

                    <div
                    id="editor"
                    class="editor-area"
                    contenteditable="true">

                        <h2>
                            Welcome to EXCEL YOU
                        </h2>

                        <p>
                            Start writing your article...
                        </p>

                    </div>

                </div>

                <!-- =========================================
                   RIGHT SETTINGS PANEL
                ========================================== -->

                <div class="editor-sidebar">

                    <div class="sidebar-card">

                        <h3>
                            Article Settings
                        </h3>

                        <!-- SUBJECT -->

                        <div class="form-group">

                            <label>
                                Subject
                            </label>

                            <select>

                                <option>
                                    Select Subject
                                </option>

                            </select>

                        </div>

                        <!-- TOPIC -->

                        <div class="form-group">

                            <label>
                                Topic
                            </label>

                            <select>

                                <option>
                                    Select Topic
                                </option>

                            </select>

                        </div>

                        <!-- STATUS -->

                        <div class="form-group">

                            <label>
                                Status
                            </label>

                            <select>

                                <option>
                                    Draft
                                </option>

                                <option>
                                    Published
                                </option>

                            </select>

                        </div>

                        <!-- THUMBNAIL -->

                        <div class="form-group">

                            <label>
                                Featured Image
                            </label>

                            <div class="upload-box">

                                <i class="fas fa-image"></i>

                                <p>
                                    Upload Thumbnail
                                </p>

                            </div>

                        </div>

                        <!-- TAGS -->

                        <div class="form-group">

                            <label>
                                Tags
                            </label>

                            <input
                            type="text"
                            placeholder="JavaScript, HTML">

                        </div>

                        <!-- SLUG -->

                        <div class="form-group">

                            <label>
                                URL Slug
                            </label>

                            <input
                            type="text"
                            placeholder="javascript-arrays">

                        </div>

                    </div>

                </div>

            </div>

        </div>

    </main>

</div>

<script src="/js/admineditor.js"></script>

</body>
</html>
