```html
<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>
        EXCEL YOU • Admin Articles
    </title>

    <link
        rel="stylesheet"
        href="/admin/css/adminarticles.css"
    >

    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"
    >

</head>

<body>

<div class="container">

    <!-- =====================================================
         SIDEBAR
    ====================================================== -->

    <aside
        class="sidebar"
        id="sidebar"
    >

        <div>

            <!-- LOGO -->

            <div class="logo">

                <div class="logo-circle">
                    E
                </div>

                <div class="logo-text">

                    <h2>
                        EXCEL YOU
                    </h2>

                    <p>
                        Admin Panel
                    </p>

                </div>

            </div>

            <!-- MENU -->

            <nav class="sidebar-menu">

                <a href="/admin/admin.html">

                    <i class="fas fa-chart-pie"></i>

                    Dashboard
                </a>

                <a href="/admin/adminsubjects.html">

                    <i class="fas fa-book"></i>

                    Subjects
                </a>

                <a href="/admin/admintopics.html">

                    <i class="fas fa-layer-group"></i>

                    Topics
                </a>

                <a
                    href="/admin/adminarticles.html"
                    class="active"
                >

                    <i class="fas fa-newspaper"></i>

                    Articles
                </a>

                <a href="/admin/admineditor.html">

                    <i class="fas fa-pen"></i>

                    Editor
                </a>

            </nav>

        </div>

        <!-- FOOTER -->

        <div class="sidebar-footer">

            <button
                class="theme-btn"
                id="themeToggle"
            >
                🌙 Dark
            </button>

            <button
                class="logout-btn"
                onclick="logout()"
            >

                <i class="fas fa-right-from-bracket"></i>

                Logout
            </button>

        </div>

    </aside>

    <!-- =====================================================
         OVERLAY
    ====================================================== -->

    <div
        class="overlay"
        id="overlay"
    ></div>

    <!-- =====================================================
         MAIN
    ====================================================== -->

    <main class="main">

        <!-- =================================================
             TOPBAR
        ================================================== -->

        <header class="topbar">

            <div class="topbar-left">

                <button
                    class="menu-btn"
                    id="mobileToggle"
                >
                    ☰
                </button>

                <div class="page-info">

                    <h1>
                        Articles
                    </h1>

                    <p>
                        Manage all published and draft articles
                    </p>

                </div>

            </div>

            <!-- PROFILE -->

            <div class="admin-profile">

                <div class="admin-avatar">
                    A
                </div>

                <div class="admin-details">

                    <h4>
                        Admin
                    </h4>

                    <p>
                        EXCEL YOU
                    </p>

                </div>

            </div>

        </header>

        <!-- =================================================
             CONTENT
        ================================================== -->

        <section class="content">

            <!-- =============================================
                 ACTION BAR
            ============================================== -->

            <div class="action-bar">

                <div class="search-box">

                    <i class="fas fa-search"></i>

                    <input
                        type="text"
                        id="searchInput"
                        placeholder="Search articles..."
                    >

                </div>

                <a
                    href="/admin/admineditor.html"
                    class="create-btn"
                >

                    <i class="fas fa-plus"></i>

                    New Article

                </a>

            </div>

            <!-- =============================================
                 ARTICLES LIST
            ============================================== -->

            <div class="dashboard-card">

                <div class="card-title">

                    <h3>
                        All Articles
                    </h3>

                </div>

                <div
                    class="articles-list"
                    id="articlesList"
                >

                    <!-- ARTICLES LOADED HERE -->

                </div>

            </div>

        </section>

    </main>

</div>

<script src="/admin/js/adminarticles.js"></script>

</body>
</html>
